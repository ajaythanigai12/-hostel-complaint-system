<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_self">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Complaint System</title>
    <meta name="description" content="Submit hostel complaints easily">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 flex items-center justify-center p-4">
    <div class="w-full max-w-2xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-3">Hostel Complaint System</h1>
            <p class="text-gray-600">For the students
            </p>
        </header>

        <main>
            <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8">
                <form id="complaintForm" class="space-y-6">

                   
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
                            Full Name <span class="text-red-500">*</span>
                        </label>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            placeholder="Enter your full name"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        >
                        <div id="nameError" class="text-red-500 text-sm mt-1 hidden"></div>
                    </div>

                    
                    <div>
                        <label for="rollNo" class="block text-sm font-medium text-gray-700 mb-2">
                            Roll Number <span class="text-red-500">*</span>
                        </label>
                        <input
                            type="text"
                            id="rollNo"
                            name="rollNo"
                            placeholder="Enter your roll number"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        >
                        <div id="rollNoError" class="text-red-500 text-sm mt-1 hidden"></div>
                    </div>

                   
                    <div>
                        <label for="complaint" class="block text-sm font-medium text-gray-700 mb-2">
                            Complaint Description <span class="text-red-500">*</span>
                        </label>
                        <textarea
                            id="complaint"
                            name="complaint"
                            rows="4"
                            placeholder="Describe your complaint in detail..."
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition resize-none"
                        ></textarea>
                        <div id="complaintError" class="text-red-500 text-sm mt-1 hidden"></div>
                    </div>

                   
                    <div class="pt-2">
                        <button
                            type="submit"
                            id="submitBtn"
                            class="w-full bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg hover:bg-blue-700 focus:ring-4 focus:ring-blue-200 transition duration-300"
                        >
                            Submit Complaint
                        </button>
                    </div>
                </form>

                
                <div id="successMessage" class="mt-6 p-4 bg-green-50 border border-green-200 rounded-lg hidden">
                    <div class="flex items-center">
                        <svg class="h-5 w-5 text-green-400 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                        </svg>
                        <div class="ml-3">
                            <p class="text-sm font-medium text-green-800">Complaint submitted successfully!</p>
                            <p class="text-sm text-green-700 mt-1">Your complaint has been recorded and will be reviewed shortly.</p>
                        </div>
                    </div>
                </div>

                
                <div id="errorMessage" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-lg hidden">
                    <div class="flex items-center">
                        <svg class="h-5 w-5 text-red-400 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                        </svg>
                        <div class="ml-3">
                            <p class="text-sm font-medium text-red-800">Something went wrong.</p>
                            <p id="errorText" class="text-sm text-red-700 mt-1"></p>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <footer class="mt-10 text-center text-gray-500 text-sm">
            <p>ajaythanigai12@gmail.com</p>
        </footer>
    </div>

    <script>
        const complaintForm  = document.getElementById('complaintForm');
        const successMessage = document.getElementById('successMessage');
        const errorMessage   = document.getElementById('errorMessage');
        const errorText      = document.getElementById('errorText');
        const submitBtn      = document.getElementById('submitBtn');

        const nameError      = document.getElementById('nameError');
        const rollNoError    = document.getElementById('rollNoError');
        const complaintError = document.getElementById('complaintError');

        
        const API_URL = "https://v43023dbdg.execute-api.ap-south-1.amazonaws.com/complaint";
        

        function validateForm(formData) {
            let isValid = true;

            [nameError, rollNoError, complaintError].forEach(el => {
                el.classList.add('hidden');
                el.textContent = '';
            });

            if (!formData.get('name') || formData.get('name').trim() === '') {
                nameError.textContent = 'Name is required';
                nameError.classList.remove('hidden');
                isValid = false;
            }
            if (!formData.get('rollNo') || formData.get('rollNo').trim() === '') {
                rollNoError.textContent = 'Roll number is required';
                rollNoError.classList.remove('hidden');
                isValid = false;
            }
            if (!formData.get('complaint') || formData.get('complaint').trim() === '') {
                complaintError.textContent = 'Complaint description is required';
                complaintError.classList.remove('hidden');
                isValid = false;
            }
            return isValid;
        }

        complaintForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(complaintForm);
            if (!validateForm(formData)) return;

            // Show loading state
            submitBtn.textContent = 'Submitting...';
            submitBtn.disabled = true;
            successMessage.classList.add('hidden');
            errorMessage.classList.add('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name:      formData.get("name").trim(),
                        rollNo:    formData.get("rollNo").trim(),
                        complaint: formData.get("complaint").trim(),
                    }),
                });

                if (response.ok) {
                    successMessage.classList.remove('hidden');
                    complaintForm.reset();
                    setTimeout(() => successMessage.classList.add('hidden'), 5000);
                } else {
                    const errData = await response.text();
                    errorText.textContent = `Server error ${response.status}: ${errData}`;
                    errorMessage.classList.remove('hidden');
                }

            } catch (err) {
                errorText.textContent = `Network error: ${err.message}. Check your API URL and CORS settings.`;
                errorMessage.classList.remove('hidden');
            }

            // Restore button
            submitBtn.textContent = 'Submit Complaint';
            submitBtn.disabled = false;
        });

        
        ['name', 'rollNo', 'complaint'].forEach(id => {
            const input = document.getElementById(id);
            const error = document.getElementById(id + 'Error');
            input.addEventListener('blur', function() {
                if (!this.value.trim()) {
                    error.textContent = 'This field is required';
                    error.classList.remove('hidden');
                } else {
                    error.classList.add('hidden');
                }
            });
            input.addEventListener('input', function() {
                if (this.value.trim()) error.classList.add('hidden');
            });
        });
    </script>
</body>
</html>
